<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'Space Grotesk'; src: url('../fonts/space-grotesk-500.woff2') format('woff2'); font-weight: 500; }
  @font-face { font-family: 'Space Grotesk'; src: url('../fonts/space-grotesk-700.woff2') format('woff2'); font-weight: 700; }
  @font-face { font-family: 'Source Sans 3'; src: url('../fonts/source-sans-3-400.woff2') format('woff2'); font-weight: 400; }
  @font-face { font-family: 'Source Sans 3'; src: url('../fonts/source-sans-3-600.woff2') format('woff2'); font-weight: 600; }
  @font-face { font-family: 'IBM Plex Mono'; src: url('../fonts/ibm-plex-mono-500.woff2') format('woff2'); font-weight: 500; }

  * { margin: 0; padding: 0; box-sizing: border-box; transition: none !important; animation: none !important; }
  html, body { width: 1440px; height: 1080px; overflow: hidden; }
  body { font-family: 'Source Sans 3', sans-serif; background: #e9ebf0; }

  #glow-a, #glow-b { position: absolute; width: 1200px; height: 1200px; border-radius: 50%; filter: blur(100px); opacity: .55; }
  #glow-a { top: -400px; left: -300px; }
  #glow-b { bottom: -440px; right: -320px; }

  .toppill { position: absolute; top: 36px; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,.92); border-radius: 999px; padding: 13px 24px; box-shadow: 0 8px 30px rgba(15,20,40,.14); z-index: 10; }
  #pill-title { left: 40px; }
  #pill-title img { width: 34px; height: 34px; }
  #pill-title span { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 700; color: #14181f; }
  #pill-slug { right: 40px; }
  #pill-slug span { font-family: 'IBM Plex Mono', monospace; font-size: 21px; font-weight: 500; color: #4b5563; }

  /* a2a: two floating cards */
  #stack { position: absolute; top: 120px; bottom: 108px; left: 130px; right: 130px; display: flex; flex-direction: column; gap: 26px; z-index: 3; }
  .fcard { position: relative; flex: 1; min-height: 0; background: #fff; border-radius: 26px; box-shadow: 0 30px 90px rgba(15,20,40,.20); padding: 20px 30px 16px; display: flex; flex-direction: column; }
  .fcard .flabel { font-family: 'Space Grotesk'; font-size: 30px; font-weight: 700; letter-spacing: 1.5px; }
  .fcard canvas { display: block; width: 100%; flex: 1; min-height: 0; }
  .fcard .ftime { position: absolute; top: 22px; right: 30px; font-family: 'IBM Plex Mono', monospace; font-size: 22px; color: #8b93a1; }

  #bottompill { position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,.94); border-radius: 999px; padding: 14px 30px; box-shadow: 0 10px 36px rgba(15,20,40,.18); z-index: 10; }
  #bp-state { font-family: 'Space Grotesk'; font-size: 26px; font-weight: 700; }
  #bp-time { font-family: 'IBM Plex Mono', monospace; font-size: 22px; color: #4b5563; }

  /* t2i: prompt card morphs up, image card springs in */
  #pcard { position: absolute; z-index: 4; background: #fff; border-radius: 24px; box-shadow: 0 30px 90px rgba(15,20,40,.20); padding: 26px 34px; }
  #pcard .klabel { font-size: 19px; font-weight: 600; letter-spacing: 1.2px; color: #8b93a1; margin-bottom: 10px; }
  #ptext-box { color: #23272f; line-height: 1.34; }
  #pcaret { display: inline-block; width: 4px; height: 1.1em; background: #ff7c00; vertical-align: text-bottom; margin-left: 3px; }
  #icard { position: absolute; z-index: 5; background: #fff; border-radius: 26px; box-shadow: 0 36px 100px rgba(15,20,40,.24); padding: 18px; opacity: 0; }
  #icard img { display: block; width: 100%; height: calc(100% - 44px); object-fit: cover; border-radius: 16px; }
  #icard .ilabel { height: 44px; display: flex; align-items: center; font-family: 'Space Grotesk'; font-size: 22px; font-weight: 700; letter-spacing: 1.2px; color: #14181f; }
  #icard .ilabel .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; margin-right: 10px; }
</style>
</head>
<body>
  <div id="glow-a"></div><div id="glow-b"></div>
  <div class="toppill" id="pill-title"><img id="temoji"><span id="ttitle"></span></div>
  <div class="toppill" id="pill-slug"><span id="tslug"></span></div>

  <div id="stack">
    <div class="fcard" id="fc-in"><span class="flabel" id="fl-in"></span><span class="ftime" id="ft-in"></span><canvas id="wave-in"></canvas></div>
    <div class="fcard" id="fc-out"><span class="flabel" id="fl-out"></span><span class="ftime" id="ft-out"></span><canvas id="wave-out"></canvas></div>
  </div>
  <div id="bottompill"><span id="bp-state"></span><span id="bp-time"></span></div>

  <div id="pcard"><div class="klabel">PROMPT</div><div id="ptext-box"><span id="ptext"></span><span id="pcaret"></span></div></div>
  <div id="icard"><div class="ilabel"><span class="dot"></span><span id="ilabel-text">LIVE OUTPUT</span></div><img id="oimg"></div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const lin=(t,a,b)=>clamp((t-a)/(b-a),0,1);
const easeIO=p=>(p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2);
const easeOut=p=>1-Math.pow(1-p,3);
const spring=p=>{const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(p-1,3)+c1*Math.pow(p-1,2);};
const lerp=(a,b,p)=>a+(b-a)*p;
let M=null,T=null;
const HF_COLORS={red:'#f0554e',orange:'#f08c2e',yellow:'#e2a80c',green:'#2eae5f',blue:'#3f83d6',indigo:'#5f6fd6',purple:'#9a5fd6',pink:'#d65f96',gray:'#69707c'};

function fitText(el,availH,min,max){let lo=min,hi=max;while(hi-lo>.5){const m=(lo+hi)/2;el.style.fontSize=m+'px';(el.offsetHeight<=availH)?lo=m:hi=m;}el.style.fontSize=lo+'px';return lo;}
async function preload(u){const i=new Image();i.src=u;try{await i.decode();}catch{}return i;}
function truncPrompt(p,max=180){if(p.length<=max+18)return p;const c=p.slice(0,max);return c.slice(0,c.lastIndexOf(' '))+'…';}

function drawWave(cv,peaks,played,on,off,ph){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,n=peaks.length;
  ctx.clearRect(0,0,W,H);
  const shape=()=>{ctx.beginPath();ctx.moveTo(0,H/2);
    for(let i=0;i<n;i++)ctx.lineTo((i+.5)*W/n,H/2-Math.max(2.5,peaks[i]*H*.45));
    ctx.lineTo(W,H/2);
    for(let i=n-1;i>=0;i--)ctx.lineTo((i+.5)*W/n,H/2+Math.max(2.5,peaks[i]*H*.45));
    ctx.closePath();};
  ctx.fillStyle=off;shape();ctx.fill();
  if(played>0){ctx.save();ctx.beginPath();ctx.rect(0,0,W*played,H);ctx.clip();ctx.fillStyle=on;shape();ctx.fill();ctx.restore();}
  if(ph&&played>0&&played<1){const x=W*played;ctx.strokeStyle='#14181f';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x,4);ctx.lineTo(x,H-4);ctx.stroke();}
}
function hexA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

window.setup = async m => {
  M=m;
  const from=HF_COLORS[m.space.colorFrom]||'#69707c', to=HF_COLORS[m.space.colorTo]||'#69707c';
  M._from=from; M._to= (m.space.colorTo===m.space.colorFrom)? '#3f83d6' : to; // mono-color Spaces get a cool counterpart
  document.getElementById('glow-a').style.background=`radial-gradient(circle, ${from} 0%, transparent 70%)`;
  document.getElementById('glow-b').style.background=`radial-gradient(circle, ${M._to} 0%, transparent 70%)`;
  $('temoji').src=m.emoji_url;
  $('ttitle').textContent=m.title||m.space.title||m.space.id.split('/')[1];
  $('tslug').textContent='hf.co/spaces/'+m.space.id;
  await document.fonts.ready;

  if (M.template==='a2a') {
    $('pcard').style.display='none'; $('icard').style.display='none';
    $('fl-in').textContent=(m.label_in||'ORIGINAL').toUpperCase();
    $('fl-out').textContent=(m.label_out||'ENHANCED').toUpperCase();
    $('fl-in').style.color=from; $('fl-out').style.color=M._to;
    const dIn=m.audio_duration_in,dOut=m.audio_duration_out,total=dIn+dOut;
    $('ft-in').textContent=dIn.toFixed(1)+'s'; $('ft-out').textContent=dOut.toFixed(1)+'s';
    for(const id of ['wave-in','wave-out']){const cv=$(id),r=cv.getBoundingClientRect();cv.width=r.width;cv.height=r.height;}
    T={playStart:1.0,dIn,dOut,total,end:1.0+total+1.5};
  } else { // t2i
    $('stack').style.display='none'; $('bottompill').style.display='none';
    M.promptShown=truncPrompt('“'+M.prompt+'”');
    // prompt card: centered big, then glides to the top; image card springs in beneath
    const pc=$('pcard');
    pc.style.width='840px';
    $('ptext').textContent=M.promptShown;
    fitText($('ptext-box'),300,28,46);
    $('ptext').textContent='';
    M._pcH = null; // measured at first seek once text height known
    await preload(M.output_image);
    const ar=M.output_aspect||1;
    const ih=660, iw=Math.min(1080,ih*ar+36);
    M._icard={w:iw,h:ih+80};
    const typeEnd=.45+Math.min(5.55,M.promptShown.length/25);
    T={typeEnd,glide:[typeEnd+1.5,typeEnd+2.2],pop:[typeEnd+2.05,typeEnd+2.75],end:typeEnd+6.2,playStart:null};
  }
  window.__T=T;
  return T.end;
};

window.seek = async t => {
  ['pill-title','pill-slug'].forEach((id,i)=>{
    const p=easeOut(lin(t,.05+i*.08,.5+i*.08));
    const el=$(id); el.style.opacity=p;
  });

  if (M.template==='a2a') {
    const from=M._from,to=M._to;
    ['fc-in','fc-out','bottompill'].forEach((id,i)=>{
      const p=easeOut(lin(t,.1+i*.1,.6+i*.1));
      const el=$(id);
      el.style.opacity=p;
      if(id!=='bottompill')el.style.transform=`translateY(${(1-p)*22}px)`;
    });
    const {playStart,dIn,dOut,total}=T;
    const el=t-playStart, phase=el<0?-1: el<dIn?0: el<total?1: 2;
    const pIn=phase<0?0:phase===0?el/dIn:1;
    const pOut=phase<1?0:phase===1?(el-dIn)/dOut:1;
    drawWave($('wave-in'),M.peaks_in,pIn,from,hexA(from,.22),phase===0);
    drawWave($('wave-out'),M.peaks_out,pOut,to,hexA(to,.22),phase===1);
    $('fc-in').style.boxShadow = phase===0? `0 30px 90px ${hexA(from,.35)}` : '0 30px 90px rgba(15,20,40,.14)';
    $('fc-out').style.boxShadow = phase===1? `0 30px 90px ${hexA(to,.35)}` : '0 30px 90px rgba(15,20,40,.14)';
    if (t>=.7) {
      $('bp-state').textContent = phase<=0? 'NOW PLAYING · '+(M.label_in||'ORIGINAL').toUpperCase()
        : phase===1? 'NOW PLAYING · '+(M.label_out||'ENHANCED').toUpperCase() : '→ TRY IT LIVE';
      $('bp-state').style.color = phase<=0? from : phase===1? to : '#14181f';
      $('bp-time').textContent = clamp(el,0,total).toFixed(1)+' / '+total.toFixed(1)+'s';
    }
  } else {
    const pc=$('pcard');
    if(M._pcH===null){M._pcH=pc.offsetHeight;} // full-text height measured after fit
    // centered -> glides to top-left scale
    const gp=easeIO(lin(t,T.glide[0],T.glide[1]));
    const cx=(1440-840)/2, cy=(1080-M._pcH)/2;
    pc.style.left=lerp(cx,120,gp)+'px';
    pc.style.top=lerp(cy,120,gp)+'px';
    pc.style.transform=`scale(${lerp(1,.62,gp)})`;
    pc.style.transformOrigin='top left';
    const ep=easeOut(lin(t,.05,.5));
    pc.style.opacity=ep;
    const shown=Math.round(easeIO(lin(t,.45,T.typeEnd))*M.promptShown.length);
    $('ptext').textContent=M.promptShown.slice(0,shown);
    $('pcaret').style.opacity=shown<M.promptShown.length?(((t*2.5)%1)<.55?1:0):0;
    // image card springs in
    const pp=lin(t,T.pop[0],T.pop[1]);
    if(pp>0&&!$('oimg').src)$('oimg').src=M.output_image;
    const ic=$('icard');
    const {w,h}=M._icard;
    ic.style.width=w+'px'; ic.style.height=h+'px';
    ic.style.left=((1440-w)/2)+'px';
    ic.style.top=((1080-h)/2+80)+'px';
    ic.style.opacity=Math.min(1,pp*2);
    ic.style.transform=`scale(${pp===0?.7:spring(pp)*.3+.7}) translateY(${(1-easeOut(pp))*40}px)`;
    ic.style.transformOrigin='center';
  }
};
</script>
</body>
</html>
