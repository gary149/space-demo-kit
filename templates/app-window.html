<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'Source Sans 3'; src: url('../fonts/source-sans-3-400.woff2') format('woff2'); font-weight: 400; }
  @font-face { font-family: 'Source Sans 3'; src: url('../fonts/source-sans-3-600.woff2') format('woff2'); font-weight: 600; }
  @font-face { font-family: 'Source Sans 3'; src: url('../fonts/source-sans-3-700.woff2') format('woff2'); font-weight: 700; }
  @font-face { font-family: 'IBM Plex Mono'; src: url('../fonts/ibm-plex-mono-400.woff2') format('woff2'); font-weight: 400; }
  @font-face { font-family: 'IBM Plex Mono'; src: url('../fonts/ibm-plex-mono-500.woff2') format('woff2'); font-weight: 500; }

  * { margin: 0; padding: 0; box-sizing: border-box; transition: none !important; animation: none !important; }
  html, body { width: 1440px; height: 1080px; overflow: hidden; }
  body { font-family: 'Source Sans 3', sans-serif; background: #eceef2; position: relative; }

  /* soft per-Space color glow behind the window */
  #glow-a, #glow-b { position: absolute; width: 900px; height: 900px; border-radius: 50%; filter: blur(90px); opacity: .55; }
  #glow-a { top: -320px; left: -220px; }
  #glow-b { bottom: -360px; right: -240px; }

  #window {
    position: absolute; inset: 18px; background: #fff; border-radius: 20px;
    border: 2px solid #e3e5ea; box-shadow: 0 30px 80px rgba(15,20,40,.16);
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ---- real hf.co Space header ---- */
  header { height: 86px; flex: none; display: flex; align-items: center; padding: 0 26px; border-bottom: 2px solid #f1f2f4; }
  #hf-logo { height: 44px; width: auto; flex: none; }
  #spaces-word { font-size: 31px; font-weight: 700; color: #111827; margin-left: 12px; line-height: 1; }
  .crumb-sep { width: 2px; height: 40px; background: #e0e3e8; transform: rotate(14deg); margin: 0 20px; flex: none; }
  .crumb-emoji { width: 34px; height: 34px; flex: none; margin-right: 12px; }
  .crumb-path { font-family: 'IBM Plex Mono', monospace; font-size: 29px; line-height: 1; position: relative; top: -2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #crumb-author { color: #98a1af; font-weight: 400; }
  .crumb-path .sl { color: #98a1af; }
  #crumb-name { color: #111827; font-weight: 600; }
  .copy-ic { width: 25px; height: 25px; stroke: #a3aab6; margin-left: 12px; flex: none; }
  #header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; flex: none; }
  #like-pill { display: flex; align-items: center; border: 2px solid #e5e7eb; border-radius: 11px; overflow: hidden; }
  #like-pill svg { width: 22px; height: 22px; stroke: #6b7280; margin: 0 8px 0 14px; }
  #like-pill .lk { font-size: 21px; color: #4b5563; padding-right: 12px; }
  #like-count { font-size: 21px; font-weight: 600; color: #4b5563; border-left: 2px solid #e5e7eb; padding: 7px 14px; }
  #status-chip { display: flex; align-items: center; gap: 9px; background: #e8f8f0; border-radius: 11px; padding: 9px 16px; }
  #status-chip .dot { width: 11px; height: 11px; border-radius: 50%; background: #10b981; flex: none; }
  #status-chip .ron { font-size: 20px; font-weight: 600; color: #047857; }
  #hw-name { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 500; font-style: italic; color: #047857; letter-spacing: .5px; }

  main { flex: 1; display: flex; gap: 16px; padding: 16px; min-height: 0; }
  #col-inputs { width: 502px; flex: none; display: flex; flex-direction: column; gap: 14px; min-height: 0; }
  #col-output { flex: 1; display: flex; min-width: 0; }

  .panel { background: #fff; border: 2px solid #e5e7eb; border-radius: 14px; display: flex; flex-direction: column; overflow: hidden; }

  /* media panels: content edge-to-edge, blurred backdrop, overlay label chip */
  .media-panel { position: relative; background: #f3f4f6; }
  .backdrop { position: absolute; left: -4%; top: -4%; width: 108%; height: 108%; object-fit: cover; filter: blur(28px) saturate(.85) brightness(1.05); }
  .media-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .media-center img { max-width: 100%; max-height: 100%; }
  .mlabel { position: absolute; top: 14px; left: 14px; display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,.94); border-radius: 999px; padding: 9px 18px; font-size: 18px; font-weight: 600; letter-spacing: 1.1px; text-transform: uppercase; color: #4b5563; box-shadow: 0 2px 10px rgba(0,0,0,.14); z-index: 5; }
  .mlabel svg { width: 20px; height: 20px; stroke: #6b7280; flex: none; }

  #panel-input-image { flex: 1; min-height: 0; }

  /* video input thumbnail (vqa mode): poster frame + duration pill + play glyph */
  .video-badge { display: none; position: absolute; bottom: 14px; right: 14px; align-items: center; gap: 7px; background: rgba(17,24,39,.78); color: #fff; font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 500; border-radius: 999px; padding: 7px 15px; z-index: 5; }
  .video-badge svg { width: 15px; height: 15px; stroke: #fff; }
  #input-play { display: none; position: absolute; top: 50%; left: 50%; width: 74px; height: 74px; margin: -37px 0 0 -37px; border-radius: 50%; background: rgba(17,24,39,.5); align-items: center; justify-content: center; z-index: 5; }
  #input-play svg { width: 28px; height: 28px; fill: #fff; margin-left: 4px; }

  #panel-prompt { flex: none; }
  .plabel { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #8b93a1; padding: 12px 16px 7px; flex: none; }
  .plabel svg { width: 20px; height: 20px; stroke: #a8aeba; flex: none; }
  .plabel .pl-right { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 500; color: #8b93a1; text-transform: none; letter-spacing: 0; }
  .prompt-body { padding: 2px 16px 14px; font-size: 24px; line-height: 1.38; color: #2f3541; }
  #caret { display: inline-block; width: 3px; height: 28px; background: #ff7c00; vertical-align: text-bottom; margin-left: 2px; }

  /* audio input panel */
  #panel-audio { flex: none; }
  #panel-audio .audio-body { position: relative; padding: 4px 16px 14px; }
  #wave-in { display: block; width: 100%; }

  #generate { flex: none; height: 76px; border: none; border-radius: 14px; background: #ff7c00; color: #fff; font-family: inherit; font-size: 28px; font-weight: 700; letter-spacing: .4px; box-shadow: 0 3px 12px rgba(255,124,0,.3); }

  #panel-output { flex: 1; min-width: 0; }

  #empty-state { position: absolute; inset: 14px; display: flex; align-items: center; justify-content: center; border: 3px dashed #e2e5ea; border-radius: 12px; z-index: 2; }
  #empty-state svg { width: 84px; height: 84px; stroke: #d3d7de; }

  #progress-track { position: absolute; top: 0; left: 0; right: 0; height: 8px; overflow: hidden; opacity: 0; z-index: 6; }
  #progress-bar { position: absolute; top: 0; width: 34%; height: 100%; background: #ff7c00; border-radius: 4px; }

  #result-wrap { z-index: 3; opacity: 0; }
  #result-frame { display: none; }
  #output-backdrop { opacity: 0; }

  /* before/after slider (image edit mode) */
  #slider-wrap { position: relative; height: 100%; overflow: hidden; display: none; }
  #slider-wrap > img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; max-width: none; max-height: none; }
  #before-clip { position: absolute; inset: 0; overflow: hidden; }
  #before-clip img { position: absolute; top: 0; left: 0; height: 100%; object-fit: cover; max-width: none; max-height: none; }
  #slider-line { position: absolute; top: 0; bottom: 0; width: 5px; background: #fff; box-shadow: 0 0 14px rgba(0,0,0,.4); }
  #slider-grip { position: absolute; top: 50%; width: 68px; height: 68px; margin: -34px 0 0 -32px; border-radius: 50%; background: #fff; box-shadow: 0 3px 14px rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; }
  #slider-grip svg { width: 34px; height: 34px; stroke: #5b6472; }
  .slider-tag { position: absolute; bottom: 16px; font-size: 21px; font-weight: 700; letter-spacing: 1.4px; padding: 9px 20px; border-radius: 999px; background: rgba(17,24,39,.78); color: #fff; }
  #tag-before { left: 16px; }
  #tag-after { right: 16px; }

  /* audio output (a2a) */
  #wave-out-wrap { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; z-index: 3; opacity: 0; background: #fff; }
  #wave-out { display: block; }
  #playhead { position: absolute; top: 12%; bottom: 12%; width: 4px; background: #111827; border-radius: 2px; opacity: 0; z-index: 4; }
  #audio-time { position: absolute; bottom: 16px; right: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 21px; font-weight: 500; color: #6b7280; background: rgba(255,255,255,.94); border-radius: 999px; padding: 8px 16px; box-shadow: 0 2px 10px rgba(0,0,0,.12); z-index: 5; }

  /* gallery output (multi-image) */
  #grid-wrap { position: absolute; inset: 14px; display: none; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; z-index: 3; }
  .grid-cell { position: relative; border-radius: 12px; overflow: hidden; background: #f3f4f6; }
  .grid-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .grid-tag { position: absolute; bottom: 10px; left: 10px; font-size: 17px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; padding: 6px 14px; border-radius: 999px; background: rgba(17,24,39,.78); color: #fff; }

  /* streamed text answer (vqa mode) */
  #text-out-wrap { position: absolute; inset: 0; display: none; padding: 46px 50px; z-index: 3; opacity: 0; overflow: hidden; background: #fff; }
  #text-out { font-size: 33px; line-height: 1.52; color: #1f2430; }
  #text-caret { display: inline-block; width: 4px; height: 32px; background: #ff7c00; vertical-align: text-bottom; margin-left: 3px; }
  #thinking-chip { position: absolute; top: 18px; left: 18px; display: flex; align-items: center; gap: 9px; background: rgba(255,124,0,.1); border-radius: 999px; padding: 9px 18px; font-size: 17px; font-weight: 700; letter-spacing: .5px; color: #d9660a; z-index: 6; opacity: 0; }
  #thinking-chip .tdot { width: 9px; height: 9px; border-radius: 50%; background: #ff7c00; }

  /* hero intro: the input opens near full-frame, then morphs into its panel slot */
  #hero { position: absolute; inset: 0; z-index: 50; display: none; }
  #hero-img { position: absolute; border-radius: 14px; box-shadow: 0 26px 70px rgba(15,20,40,.28); object-fit: contain; }
  #hero-mlabel { position: absolute; display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,.94); border-radius: 999px; padding: 9px 18px; font-size: 18px; font-weight: 600; letter-spacing: 1.1px; text-transform: uppercase; color: #4b5563; box-shadow: 0 2px 10px rgba(0,0,0,.14); }
  #hero-mlabel svg { width: 20px; height: 20px; stroke: #6b7280; flex: none; }
  #hero-play { position: absolute; width: 92px; height: 92px; border-radius: 50%; background: rgba(17,24,39,.5); display: none; align-items: center; justify-content: center; }
  #hero-play svg { width: 36px; height: 36px; fill: #fff; margin-left: 5px; }
  #hero-prompt { position: absolute; color: #2f3541; line-height: 1.35; }
  #hero-caret { display: inline-block; width: 4px; background: #ff7c00; vertical-align: text-bottom; margin-left: 2px; }

  footer { height: 62px; flex: none; display: flex; align-items: center; gap: 14px; padding: 0 26px; border-top: 2px solid #f1f2f4; }
  #slug { display: flex; align-items: center; gap: 11px; font-family: 'IBM Plex Mono', monospace; font-size: 24px; color: #5b6472; white-space: nowrap; }
  #slug img { width: 29px; height: 29px; }
  #meta { margin-left: auto; position: relative; height: 32px; min-width: 0; overflow: hidden; }
  #meta-info { font-size: 18px; color: #9ca3af; line-height: 32px; white-space: nowrap; }
  #meta-cta { position: absolute; right: 0; top: 0; font-size: 24px; font-weight: 700; color: #ff7c00; opacity: 0; white-space: nowrap; line-height: 32px; }
</style>
</head>
<body>
  <div id="glow-a"></div><div id="glow-b"></div>
  <div id="window">
    <header>
      <img id="hf-logo">
      <span id="spaces-word">Spaces</span>
      <span class="crumb-sep"></span>
      <img class="crumb-emoji" id="emoji-img">
      <span class="crumb-path"><span id="crumb-author"></span><span class="sl">/</span><span id="crumb-name"></span></span>
      <svg class="copy-ic" viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <div id="header-right">
        <div id="like-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          <span class="lk">like</span><span id="like-count"></span>
        </div>
        <div id="status-chip"><span class="dot"></span><span class="ron">Running on</span><span id="hw-name"></span></div>
      </div>
    </header>
    <main>
      <section id="col-inputs">
        <div class="panel media-panel" id="panel-input-image">
          <img class="backdrop" id="input-backdrop">
          <div class="media-center"><img id="input-img"></div>
          <div class="video-badge" id="video-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            <span id="video-dur"></span>
          </div>
          <div id="input-play"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg></div>
          <div class="mlabel">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            <span id="input-label">input image</span>
          </div>
        </div>
        <div class="panel" id="panel-audio">
          <div class="plabel">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg>
            <span id="audio-label">voice clip</span>
            <span class="pl-right" id="audio-dur"></span>
          </div>
          <div class="audio-body"><canvas id="wave-in"></canvas></div>
        </div>
        <div class="panel" id="panel-prompt">
          <div class="plabel">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 6.1H3M21 12.1H3M15.1 18H3"/></svg>
            <span id="prompt-label">prompt</span>
          </div>
          <div class="prompt-body"><span><span id="prompt-text"></span><span id="caret"></span></span></div>
        </div>
        <button id="generate">Generate</button>
      </section>
      <section id="col-output">
        <div class="panel media-panel" id="panel-output">
          <div id="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><rect x="2" y="4" width="20" height="16" rx="2"/><polygon points="10 9 15 12 10 15 10 9"/></svg>
          </div>
          <img class="backdrop" id="output-backdrop">
          <div class="media-center" id="result-wrap">
            <img id="result-frame">
            <div id="slider-wrap">
              <img id="after-img">
              <div id="before-clip"><img id="before-img"></div>
              <div id="slider-line"><div id="slider-grip">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4"><path d="m9 18-6-6 6-6M15 6l6 6-6 6"/></svg>
              </div></div>
              <div class="slider-tag" id="tag-before">BEFORE</div>
              <div class="slider-tag" id="tag-after">AFTER</div>
            </div>
          </div>
          <div id="wave-out-wrap"><canvas id="wave-out"></canvas><div id="playhead"></div><div id="audio-time"></div></div>
          <div id="grid-wrap"></div>
          <div id="text-out-wrap">
            <div id="thinking-chip"><span class="tdot"></span><span id="thinking-label">SAMPLING VIDEO FRAMES</span></div>
            <div id="text-out"><span id="text-out-content"></span><span id="text-caret"></span></div>
          </div>
          <div class="mlabel">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="6 3 20 12 6 21 6 3"/></svg>
            <span id="output-label">output</span>
          </div>
          <div id="progress-track"><div id="progress-bar"></div></div>
        </div>
      </section>
    </main>
    <footer>
      <div id="slug"><img id="hf-emoji"><span id="slug-text"></span></div>
      <div id="meta"><span id="meta-info"></span><span id="meta-cta">&rarr;&nbsp; Try it live</span></div>
    </footer>
  </div>

  <div id="hero">
    <img id="hero-img">
    <div id="hero-mlabel">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <span id="hero-label-text"></span>
    </div>
    <div id="hero-play"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg></div>
    <div id="hero-prompt"><span id="hero-prompt-text"></span><span id="hero-caret"></span></div>
  </div>

<script>
'use strict';
/* Deterministic, seekable demo animation. window.setup(manifest) -> duration (s);
   window.seek(t) renders the exact state for time t. No RAF, no CSS animations.
   Modes: i2v, t2v, edit, avatar (image+audio -> video), a2a (audio -> audio),
   gallery (image+text -> N images). */

const HF_COLORS = {
  red: '#f87171', orange: '#fb923c', yellow: '#facc15', green: '#4ade80',
  blue: '#60a5fa', indigo: '#818cf8', purple: '#c084fc', pink: '#f472b6', gray: '#9ca3af',
};
const HW_NAMES = {
  'zero-a10g': 'ZERO', 'cpu-basic': 'CPU', 'cpu-upgrade': 'CPU UPGRADE',
  't4-small': 'T4', 't4-medium': 'T4', 'a10g-small': 'A10G', 'a10g-large': 'A10G',
  'l4x1': 'L4', 'l40sx1': 'L40S', 'a100-large': 'A100',
};

const $ = id => document.getElementById(id);
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const lin = (t, a, b) => clamp((t - a) / (b - a), 0, 1);
const easeIO = p => (p < .5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2);
const easeOut = p => 1 - Math.pow(1 - p, 3);

let M = null, T = null, FRAMES = [], INPUT_FRAMES = [], PROMPT_SHOWN = '';
let HERO = null; // {imgFrom, imgTo, prFrom, prTo} rects for the intro morph
const HAS = { prompt: false, image: false, audio: false };

const lerp = (a, b, p) => a + (b - a) * p;
const lerpRect = (a, b, p) => ({
  left: lerp(a.left, b.left, p), top: lerp(a.top, b.top, p),
  width: lerp(a.width, b.width, p), height: lerp(a.height, b.height, p),
});
function setRect(el, r) {
  el.style.left = r.left + 'px'; el.style.top = r.top + 'px';
  el.style.width = r.width + 'px'; el.style.height = r.height + 'px';
}
function containFit(aw, ah, maxW, maxH) { // aspect-fit a media box, centered horizontally
  let w = maxW, h = w * ah / aw;
  if (h > maxH) { h = maxH; w = h * aw / ah; }
  return { width: w, height: h };
}

function hexOf(name) { return HF_COLORS[name] || '#9ca3af'; }
function fmtLikes(n) {
  if (n >= 1000) { const k = n / 1000; return (k >= 10 ? Math.round(k) : k.toFixed(2).replace(/0+$/, '').replace(/\.$/, '')) + 'k'; }
  return String(n);
}
function truncPrompt(p, max = 150) {
  if (p.length <= max + 18) return p;
  const cut = p.slice(0, max);
  return cut.slice(0, cut.lastIndexOf(' ')) + '…';
}
async function preload(url) {
  // decode() can reject transiently under memory pressure; retry once, then
  // fall back to lazy decode at paint time (seek() re-decodes per frame).
  const img = new Image();
  img.src = url;
  try { await img.decode(); } catch {
    await new Promise(r => setTimeout(r, 60));
    try { await img.decode(); } catch {}
  }
  return img;
}

function drawWave(cv, peaks, played, onColor, offColor) {
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  const n = peaks.length, bw = W / n;
  for (let i = 0; i < n; i++) {
    const h = Math.max(4, peaks[i] * H * .92);
    ctx.fillStyle = (i + .5) / n <= played ? onColor : offColor;
    ctx.beginPath();
    ctx.roundRect(i * bw + bw * .2, (H - h) / 2, bw * .6, h, bw * .3);
    ctx.fill();
  }
}

window.setup = async manifest => {
  M = manifest;
  const from = hexOf(M.space.colorFrom), to = hexOf(M.space.colorTo);
  const [author, repo] = M.space.id.split('/');

  $('glow-a').style.background = `radial-gradient(circle, ${from} 0%, transparent 70%)`;
  $('glow-b').style.background = `radial-gradient(circle, ${to} 0%, transparent 70%)`;
  $('hf-logo').src = M.hf_logo_url;
  $('emoji-img').src = M.emoji_url;
  $('hf-emoji').src = M.hf_emoji_url;
  $('crumb-author').textContent = author;
  $('crumb-name').textContent = repo;
  $('like-count').textContent = fmtLikes(M.space.likes || 0);
  $('hw-name').textContent = HW_NAMES[M.space.hardware] || (M.space.hardware || 'CPU').toUpperCase();
  $('slug-text').textContent = 'hf.co/spaces/' + M.space.id;
  $('meta-info').textContent = M.meta || '';
  if (M.space.id.length > 32) { // long ids: shrink footer type so nothing wraps or clips
    $('slug').style.fontSize = '19px';
    $('meta-info').style.fontSize = '15px';
  }
  $('input-label').textContent = M.input_label || 'input image';
  $('prompt-label').textContent = M.prompt_label || 'prompt';
  $('output-label').textContent = M.output_label || 'output';
  $('audio-label').textContent = M.audio_label || 'audio';
  if (M.button) $('generate').textContent = M.button;

  // which input slots does this mode use?
  HAS.image = ['i2v', 'edit', 'avatar', 'gallery', 'vqa'].includes(M.template);
  HAS.prompt = ['i2v', 'edit', 't2v', 'gallery', 'vqa'].includes(M.template);
  HAS.audio = ['avatar', 'a2a'].includes(M.template);
  $('panel-input-image').style.display = HAS.image ? 'flex' : 'none';
  $('panel-prompt').style.display = HAS.prompt ? 'flex' : 'none';
  $('panel-audio').style.display = HAS.audio ? 'flex' : 'none';
  if (M.template === 't2v') { // prompt-only input: let it fill the column
    $('panel-prompt').style.flex = '1';
    document.querySelector('.prompt-body').style.fontSize = '30px';
    document.querySelector('.prompt-body').style.lineHeight = '1.45';
  }
  if (M.template === 'a2a') {
    $('panel-audio').style.flex = '1';
    $('panel-audio').querySelector('.audio-body').style.flex = '1';
  }
  if (['edit', 'gallery', 'a2a', 'vqa'].includes(M.template)) {
    $('empty-state').querySelector('svg').innerHTML = M.template === 'a2a'
      ? '<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/>'
      : M.template === 'vqa'
      ? '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'
      : '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>';
  }
  $('video-badge').style.display = M.template === 'vqa' ? 'flex' : 'none';
  $('input-play').style.display = M.template === 'vqa' ? 'flex' : 'none';
  if (M.template === 'vqa') $('input-label').textContent = M.input_label || 'video (primary input)';

  await document.fonts.ready;
  if (HAS.image) {
    await preload(M.input_image);
    $('input-img').src = M.input_image;
    $('input-backdrop').src = M.input_image;
    if (M.template === 'vqa') $('video-dur').textContent = Math.round(M.video_duration) + 's';
  }
  if (HAS.audio) {
    $('audio-dur').textContent = M.audio_duration.toFixed(1) + 's';
    const cv = $('wave-in');
    const body = $('panel-audio').querySelector('.audio-body');
    cv.width = body.getBoundingClientRect().width - 32;
    cv.height = M.template === 'a2a' ? Math.max(120, body.getBoundingClientRect().height - 20) : 130;
    if (M.template === 'a2a') cv.style.height = cv.height + 'px';
  }

  PROMPT_SHOWN = HAS.prompt ? truncPrompt(M.prompt) : '';

  // --- hero intro: input opens near full-frame, then morphs into the layout ---
  const wantHero = (HAS.image || HAS.prompt) && M.template !== 'a2a' && M.hero !== false;
  let press;
  if (wantHero) {
    HERO = {};
    if (HAS.image) {
      const img = $('input-img');
      const to = img.getBoundingClientRect();
      const maxH = HAS.prompt ? 600 : 800;
      const fit = containFit(img.naturalWidth || 1, img.naturalHeight || 1, 1000, maxH);
      HERO.imgFrom = { left: (1440 - fit.width) / 2, top: 96, ...fit };
      HERO.imgTo = { left: to.left, top: to.top, width: to.width, height: to.height };
      $('hero-img').src = M.input_image;
      $('hero-label-text').textContent = M.input_label || 'input image';
      if (M.template === 'vqa') $('hero-play').style.display = 'flex';
    }
    if (HAS.prompt) {
      const pb = document.querySelector('.prompt-body');
      const pr = pb.getBoundingClientRect();
      const toFs = parseFloat(getComputedStyle(pb).fontSize);
      HERO.prTo = { left: pr.left + 16, top: pr.top + 2, width: pr.width - 32, fs: toFs };
      HERO.prFrom = HAS.image
        ? { left: 220, top: HERO.imgFrom.top + HERO.imgFrom.height + 44, width: 1000, fs: 40 }
        : { left: 190, top: 340, width: 1060, fs: 46 };
    }
    const heroIn = [0, .35];
    const heroType = HAS.prompt ? .45 + Math.min(1.85, PROMPT_SHOWN.length / 75) : 1.05;
    const morph = [heroType + .3, heroType + 1.15];
    T = { hero: { in: heroIn, typeEnd: heroType, morph } };
    press = [morph[1] + .25, morph[1] + .55];
  } else {
    const typeEnd = HAS.prompt ? .25 + Math.min(1.45, PROMPT_SHOWN.length / 105) : .85;
    T = {};
    press = [typeEnd + .2, typeEnd + .5];
  }
  const progress = [press[1], press[1] + .85];
  const reveal = [progress[1], progress[1] + .3];
  T.press = press; T.progress = progress; T.reveal = reveal;

  if (['i2v', 't2v', 'avatar'].includes(M.template)) {
    FRAMES = [];
    for (let i = 0; i < M.frame_files.length; i += 24)
      await Promise.all(M.frame_files.slice(i, i + 24).map(preload));
    for (const f of M.frame_files) { const im = new Image(); im.src = f; FRAMES.push(im); }
    $('result-frame').style.display = 'block';
    T.playStart = reveal[0] + .1;
    T.playEnd = T.playStart + M.frame_count / M.video_fps;
    T.dim = T.playEnd - 1.1;
    T.end = T.playEnd + .5;
  } else if (M.template === 'edit') {
    await preload(M.before_image); await preload(M.after_image);
    $('after-img').src = M.after_image;
    $('before-img').src = M.before_image;
    $('output-backdrop').src = M.after_image;
    $('slider-wrap').style.display = 'block';
    const body = $('panel-output').getBoundingClientRect();
    const bw = body.width - 4, bh = body.height - 4;
    const ar = M.after_aspect;
    let w = bh * ar, h = bh;
    if (w > bw) { w = bw; h = w / ar; }
    $('slider-wrap').style.width = w + 'px'; $('slider-wrap').style.height = h + 'px';
    $('before-clip').querySelector('img').style.width = w + 'px';
    T.slider = { s1: [reveal[1] + .5, reveal[1] + 2.6], p1: .4, s2end: reveal[1] + 4.4 };
    T.dim = T.slider.s2end + .7;
    T.end = T.slider.s2end + 1.7;
  } else if (M.template === 'a2a') {
    const wrap = $('wave-out-wrap');
    wrap.style.display = 'flex';
    const body = $('panel-output').getBoundingClientRect();
    const cv = $('wave-out');
    cv.width = body.width - 120; cv.height = Math.min(420, body.height * .5);
    T.playStart = reveal[1] + .25;
    T.playEnd = T.playStart + M.audio_duration;
    T.dim = T.playEnd + .15;
    T.end = T.playEnd + 1.1;
  } else if (M.template === 'gallery') {
    const grid = $('grid-wrap');
    grid.style.display = 'grid';
    for (const o of M.outputs) {
      await preload(o.url);
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.innerHTML = `<img src="${o.url}"><div class="grid-tag">${o.label}</div>`;
      grid.appendChild(cell);
    }
    T.pops = M.outputs.map((_, i) => reveal[0] + .15 + i * .3);
    T.dim = T.pops[T.pops.length - 1] + 2.6;
    T.end = T.dim + 1.1;
  } else if (M.template === 'vqa') {
    $('text-out-wrap').style.display = 'block';
    T.thinkStart = T.progress[0] + .1;
    T.answerStart = reveal[0] + .2;
    const revealDur = clamp(M.answer.length / 34, 2.2, 4.6);
    T.answerEnd = T.answerStart + revealDur;
    T.dim = T.answerEnd + 1.1;
    T.end = T.dim + .9;
    if (M.input_frame_files) {
      INPUT_FRAMES = [];
      for (let i = 0; i < M.input_frame_files.length; i += 24)
        await Promise.all(M.input_frame_files.slice(i, i + 24).map(preload));
      for (const f of M.input_frame_files) { const im = new Image(); im.src = f; INPUT_FRAMES.push(im); }
      // the full source clip plays accelerated while the model watches + answers
      T.vidStart = T.press[1];
      T.vidEnd = T.answerEnd;
    }
  }
  window.__T = T;
  return T.end;
};

function setSlider(pct) {
  $('before-clip').style.width = pct + '%';
  $('slider-line').style.left = `calc(${pct}% - 2.5px)`;
}

window.seek = async t => {
  // --- hero intro: big input + big prompt morphing into the app layout ---
  if (T.hero) {
    const H = T.hero;
    const mp = easeIO(lin(t, H.morph[0], H.morph[1]));
    $('window').style.opacity = mp;
    const done = t >= H.morph[1];
    $('hero').style.display = done ? 'none' : 'block';
    if (!done) {
      const ip = easeOut(lin(t, H.in[0], H.in[1]));
      const chipFade = ip * (1 - lin(t, H.morph[0], H.morph[0] + .3));
      if (HERO.imgFrom) {
        const r = lerpRect(HERO.imgFrom, HERO.imgTo, mp);
        setRect($('hero-img'), r);
        $('hero-img').style.opacity = ip;
        $('hero-img').style.borderRadius = lerp(14, 4, mp) + 'px';
        $('hero-img').style.boxShadow = `0 26px 70px rgba(15,20,40,${.28 * (1 - mp)})`;
        $('hero-img').style.transform = `translateY(${(1 - ip) * 18}px)`;
        const ml = $('hero-mlabel');
        ml.style.left = (r.left + 14) + 'px'; ml.style.top = (r.top + 14) + 'px';
        ml.style.opacity = chipFade;
        const hp = $('hero-play');
        hp.style.left = (r.left + r.width / 2 - 46) + 'px';
        hp.style.top = (r.top + r.height / 2 - 46) + 'px';
        hp.style.opacity = chipFade;
      }
      if (HAS.prompt) {
        const shown = Math.round(easeIO(lin(t, H.in[1], H.typeEnd)) * PROMPT_SHOWN.length);
        $('hero-prompt-text').textContent = PROMPT_SHOWN.slice(0, shown);
        const pr = {
          left: lerp(HERO.prFrom.left, HERO.prTo.left, mp),
          top: lerp(HERO.prFrom.top, HERO.prTo.top, mp),
          width: lerp(HERO.prFrom.width, HERO.prTo.width, mp),
        };
        const fs = lerp(HERO.prFrom.fs, HERO.prTo.fs, mp);
        const el = $('hero-prompt');
        el.style.left = pr.left + 'px'; el.style.top = pr.top + 'px';
        el.style.width = pr.width + 'px'; el.style.fontSize = fs + 'px';
        el.style.opacity = Math.min(1, ip) * (1 - lin(t, H.morph[0] + .3, H.morph[0] + .72));
        const typing = shown < PROMPT_SHOWN.length;
        $('hero-caret').style.height = (fs * 1.15) + 'px';
        $('hero-caret').style.opacity = typing && mp === 0 ? (((t * 2.5) % 1) < .55 ? 1 : 0) : 0;
      }
    }
    if (HAS.prompt) { // panel shows the final text; typing happened in the hero
      $('prompt-text').textContent = PROMPT_SHOWN;
      $('caret').style.opacity = 0;
    }
  } else if (HAS.prompt) {
    const tp = lin(t, .25, T.press[0] - .2 + .001);
    const shown = Math.round(easeIO(tp) * PROMPT_SHOWN.length);
    $('prompt-text').textContent = PROMPT_SHOWN.slice(0, shown);
    const typing = shown < PROMPT_SHOWN.length;
    $('caret').style.opacity = typing ? (((t * 2.5) % 1) < .55 ? 1 : 0) : 0;
  }

  // --- input waveform (avatar: sync played state with output playback) ---
  if (HAS.audio) {
    const played = M.template === 'avatar' && T.playStart ? lin(t, T.playStart, T.playEnd) : 0;
    drawWave($('wave-in'), M.peaks_in, played, '#ff7c00', '#c3cad4');
  }

  // --- generate press ---
  const pp = lin(t, T.press[0], T.press[1]);
  const dip = Math.sin(Math.PI * pp);
  $('generate').style.transform = `scale(${1 - .045 * dip})`;
  $('generate').style.filter = `brightness(${1 - .13 * dip})`;

  // --- progress ---
  const inProgress = t >= T.progress[0] && t < T.progress[1];
  $('progress-track').style.opacity = inProgress ? 1 : 0;
  if (inProgress) {
    const cycle = ((t - T.progress[0]) / .5) % 1;
    $('progress-bar').style.left = (-34 + cycle * 140) + '%';
    $('empty-state').style.borderColor = `rgba(255,124,0,${.25 + .3 * Math.sin((t - T.progress[0]) * 9)})`;
  }

  // --- reveal result ---
  const rp = easeOut(lin(t, T.reveal[0], T.reveal[1]));
  $('empty-state').style.opacity = 1 - rp;
  const rw = $('result-wrap');
  rw.style.opacity = rp;
  rw.style.transform = `scale(${1.025 - .025 * rp})`;
  $('output-backdrop').style.opacity = rp * .9;

  // --- mode-specific result content ---
  if (['i2v', 't2v', 'avatar'].includes(M.template)) {
    if (t >= T.reveal[0]) {
      const idx = clamp(Math.floor((t - T.playStart) * M.video_fps), 0, FRAMES.length - 1);
      const im = FRAMES[idx];
      if (im && $('result-frame').src !== im.src) {
        $('result-frame').src = im.src;
        $('output-backdrop').src = im.src;
        try { await im.decode(); } catch {}
      }
    }
  } else if (M.template === 'edit') {
    if (t >= T.reveal[0]) {
      const sl = T.slider;
      let pct = 96;
      if (t < sl.s1[0]) pct = 96;
      else if (t < sl.s1[1]) pct = 96 - easeIO(lin(t, sl.s1[0], sl.s1[1])) * 88;
      else if (t < sl.s1[1] + sl.p1) pct = 8;
      else pct = 8 + easeIO(lin(t, sl.s1[1] + sl.p1, sl.s2end)) * 42;
      setSlider(pct);
      const tagP = lin(t, T.reveal[1], T.reveal[1] + .3);
      $('tag-before').style.opacity = tagP;
      $('tag-after').style.opacity = tagP;
    }
  } else if (M.template === 'a2a') {
    $('wave-out-wrap').style.opacity = rp;
    if (t >= T.reveal[0]) {
      const played = lin(t, T.playStart, T.playEnd);
      drawWave($('wave-out'), M.peaks_out, played, '#ff7c00', '#c3cad4');
      const cv = $('wave-out'), wrap = $('wave-out-wrap');
      const left = (wrap.getBoundingClientRect().width - cv.width) / 2;
      $('playhead').style.left = (left + played * cv.width) + 'px';
      $('playhead').style.opacity = t >= T.playStart && t <= T.playEnd ? .85 : 0;
      const cur = Math.min(M.audio_duration, Math.max(0, (t - T.playStart)));
      $('audio-time').textContent = cur.toFixed(1) + 's / ' + M.audio_duration.toFixed(1) + 's';
    }
  } else if (M.template === 'gallery') {
    const cells = document.querySelectorAll('.grid-cell');
    cells.forEach((c, i) => {
      const p = easeOut(lin(t, T.pops[i], T.pops[i] + .35));
      c.style.opacity = p;
      c.style.transform = `scale(${.92 + .08 * p})`;
    });
  } else if (M.template === 'vqa') {
    const chipP = lin(t, T.thinkStart, T.thinkStart + .3) - lin(t, T.answerStart - .15, T.answerStart);
    $('thinking-chip').style.opacity = clamp(chipP, 0, 1);
    $('text-out-wrap').style.opacity = rp;
    if (t >= T.answerStart) {
      const shown = Math.round(lin(t, T.answerStart, T.answerEnd) * M.answer.length);
      $('text-out-content').textContent = M.answer.slice(0, shown);
      const typing = shown < M.answer.length;
      $('text-caret').style.opacity = typing ? (((t * 3) % 1) < .55 ? 1 : 0) : 0;
    }
    // input clip plays through, accelerated to fit the watch+answer window
    if (INPUT_FRAMES.length && t >= T.vidStart) {
      const frac = lin(t, T.vidStart, T.vidEnd);
      const im = INPUT_FRAMES[Math.min(INPUT_FRAMES.length - 1, Math.floor(frac * INPUT_FRAMES.length))];
      if (im && $('input-img').src !== im.src) {
        $('input-img').src = im.src;
        $('input-backdrop').src = im.src;
        try { await im.decode(); } catch {}
      }
      $('input-play').style.display = 'none';
      const speed = M.video_duration / (T.vidEnd - T.vidStart);
      $('video-dur').textContent = Math.round(M.video_duration) + 's · ' + speed.toFixed(0) + '× speed';
    }
  }

  // --- ending: dim inputs, CTA in footer ---
  const dp = easeIO(lin(t, T.dim, T.dim + .6));
  $('col-inputs').style.opacity = 1 - .5 * dp;
  $('header-right').style.opacity = 1 - .5 * dp;
  $('meta-info').style.opacity = 1 - lin(t, T.dim, T.dim + .25);
  $('meta-cta').style.opacity = lin(t, T.dim + .3, T.dim + .6);
  $('slug').style.color = dp > .5 ? '#111827' : '#6b7280';
};
</script>
</body>
</html>
